name: "Backend - Destroy"

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "Choose the version"
        required: true
        default: "dev"
      instance:
        type: choice
        description: "Choose the instance"
        required: true
        default: "dev"
        options:
          - dev
          - ua
          - preprod
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  resolve-workflow-dispatch-inputs:
    name: Resolve inputs and list Micro-Applications
    outputs:
      instance: ${{ steps.resolve.outputs.instance }}
      version: ${{ steps.resolve.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version and instance inputs
        id: resolve
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow-dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "instance=${{ inputs.instance }}" >> $GITHUB_OUTPUT
          else
              echo "version=$TAG" >> $GITHUB_OUTPUT
              echo "instance=ua" >> $GITHUB_OUTPUT
          fi

      - name: Assuming federated role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_FED_ROLE_ARN }}
          role-session-name: Federal

          
      - name: Check version existence
        if: github.event_name == 'workflow-dispatch'
        shell: bash
        run: |
          if aws s3 ls "s3://${{ secrets.ARCHIVE_BUCKET_NAME }}/backend/${{ steps.resolve.outputs.version }}/" > /dev/null 2>&1; then
            echo "::notice::Version exists."
          else
            echo "::error::Wrong version number: ${{ steps.resolve.outputs.version }}"
            exit 1
          fi

  destroying-backend:
    name: Destroying backend
    needs: resolve-workflow-dispatch-inputs
    environment: ${{ needs.resolve-workflow-dispatch-inputs.outputs.instance}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Assume main role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_FED_ROLE_ARN }}
          role-session-name: Federal

      - name: Chain deploy role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_WORKER_ROLE_ARN }}
          role-session-name: Secondary
          role-chaining: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (with backend config)
        run: |
          cd deployments/backend
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=backend-${{ needs.resolve-workflow-dispatch-inputs.outputs.instance }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Destroy
        run: |
            cd deployments/backend
            terraform destroy -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_environment: ${{ needs.resolve-workflow-dispatch-inputs.outputs.instance }}
          TF_VAR_account_id: ${{ secrets.PROFILE_ID}}
          
      - name: Post text to a Slack channel
        if: failure()               
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.DEVOPS_SLACK_ID }}
            text: |
              ❌ Backend Destroy Workflow failed
              Workflow: ${{ github.workflow }}
              Repo: ${{ github.repository }}
              Actor: ${{ github.actor }}
              Environment: ${{ needs.resolve-workflow-dispatch-inputs.outputs.instance }}